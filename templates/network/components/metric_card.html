{% load i18n %}
<div class="relative bg-base-200/50 backdrop-blur-xl rounded-2xl p-6 border border-base-300 hover:border-electric/30 transition-all duration-300 hover:shadow-lg hover:shadow-electric/10 hover:-translate-y-1 group">
  <div class="absolute inset-0 bg-gradient-to-br from-white/5 to-transparent rounded-2xl opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
  <div class="relative">
    <div class="flex items-start justify-between mb-4">
      <div class="p-3 rounded-xl bg-{{ color }}/10 group-hover:bg-{{ color }}/20 transition-colors duration-300">
        <i class="fa fa-{{ icon }} text-{{ color }} text-2xl"></i>
      </div>
      {% if progress %}
      <div class="relative w-16 h-16">
        <svg class="w-16 h-16 transform -rotate-90">
          <circle cx="32" cy="32" r="28" stroke="currentColor" stroke-width="4" fill="transparent" class="text-base-300" />
          <circle cx="32" cy="32" r="28" stroke="currentColor" stroke-width="4" fill="transparent" 
                  stroke-dasharray="175.93" stroke-dashoffset="175.93"
                  class="text-{{ color }} transition-all duration-1000 ease-out" 
                  style="stroke-dashoffset: calc(175.93 - (175.93 * {{ progress }} / 100))" />
        </svg>
        <div class="absolute inset-0 flex items-center justify-center">
          <span class="text-xs font-semibold text-base-content">{{ progress }}%</span>
        </div>
      </div>
      {% endif %}
    </div>
    <div class="mb-1">
      <span class="text-3xl font-bold text-base-content counter-animation" data-target="{{ value }}">{{ value }}</span>
      {% if change %}
      <span class="ml-2 text-sm font-medium text-{{ change_color }}">
        {% if change > 0 %}↑{{ change }}{% else %}↓{% widthratio change -1 1 %}{% endif %}%
      </span>
      {% endif %}
    </div>
    <h3 class="text-base-content/60 text-sm font-medium">{{ title }}</h3>
    {% if subtitle %}
    <p class="text-xs text-base-content/40 mt-1">{{ subtitle }}</p>
    {% endif %}
  </div>
</div>
