{% load i18n %}
<div class="relative bg-navy-light/50 backdrop-blur-xl rounded-2xl p-6 border border-white/10 hover:border-{{ color }}/30 transition-all duration-300 hover:shadow-lg hover:shadow-{{ color }}/10 hover:-translate-y-1 group overflow-hidden">
  <div class="absolute inset-0 bg-gradient-to-br from-{{ color }}/10 to-transparent rounded-2xl opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
  <div class="relative">
    <div class="flex items-center justify-between mb-4">
      <div class="flex items-center gap-3">
        <div class="p-3 rounded-xl bg-{{ color }}/10 group-hover:bg-{{ color }}/20 transition-colors duration-300">
          <i class="fa fa-{{ icon }} text-{{ color }} text-2xl"></i>
        </div>
        <h3 class="text-lg font-semibold text-white">{{ title }}</h3>
      </div>
      <div class="text-right">
        <span class="text-2xl font-bold text-white counter-animation" data-target="{{ speed }}">{{ speed }}</span>
        <span class="text-sm text-base-content/60 ml-1">Mbps</span>
      </div>
    </div>
    
    <!-- Mini Chart -->
    <div class="h-16 mb-3">
      <canvas id="{{ chart_id }}"></canvas>
    </div>
    
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-2">
        <span class="text-xs text-base-content/40">Peak Speed</span>
        <span class="text-sm font-semibold text-{{ color }}">{{ peak }} Mbps</span>
      </div>
      <div class="flex items-center gap-1">
        <i class="fa fa-arrow-up text-xs text-emerald"></i>
        <span class="text-sm font-semibold text-emerald">{{ change }}%</span>
      </div>
    </div>
  </div>
</div>
