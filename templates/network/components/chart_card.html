{% load i18n %}
<div class="relative bg-navy-light/50 backdrop-blur-xl rounded-2xl p-6 border border-white/10 hover:border-electric/30 transition-all duration-300 hover:shadow-lg hover:shadow-electric/10">
  <div class="flex items-center justify-between mb-6">
    <div class="flex items-center gap-3">
      <div class="p-3 rounded-xl bg-electric/10">
        <i class="fa fa-{{ icon }} text-electric text-xl"></i>
      </div>
      <h3 class="text-lg font-semibold text-white">{{ title }}</h3>
    </div>
    {% if selector %}
    <div class="flex gap-2">
      <button class="px-3 py-1 text-xs rounded-lg bg-electric/20 text-electric border border-electric/30">24H</button>
      <button class="px-3 py-1 text-xs rounded-lg bg-white/5 text-base-content/60 hover:bg-white/10 transition-colors">7D</button>
      <button class="px-3 py-1 text-xs rounded-lg bg-white/5 text-base-content/60 hover:bg-white/10 transition-colors">30D</button>
    </div>
    {% endif %}
  </div>
  <div class="h-64">
    <canvas id="{{ chart_id }}"></canvas>
  </div>
</div>
